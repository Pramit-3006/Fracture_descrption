apiVersion: apps/v1
kind: Deployment
metadata:
  name: osteoinsight-backend-deployment
  namespace: clinical-diagnostics
  labels:
    app: osteoinsight-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: osteoinsight-backend
  template:
    metadata:
      labels:
        app: osteoinsight-backend
    spec:
      containers:
      - name: backend-service
        image: osteoinsight-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: "2"
            memory: 4Gi
            nvidia.com/gpu: "1" # Request direct GPU Acceleration
          requests:
            cpu: "500m"
            memory: 1Gi
            nvidia.com/gpu: "1"
        env:
        - name: POSTGRES_SERVER
          value: "postgres-service.clinical-diagnostics.svc.cluster.local"
        - name: MONGODB_URI
          value: "mongodb://mongodb-service:27017"
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: osteoinsight-backend-service
  namespace: clinical-diagnostics
spec:
  selector:
    app: osteoinsight-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
